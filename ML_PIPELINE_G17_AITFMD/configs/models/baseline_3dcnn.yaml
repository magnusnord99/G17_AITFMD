# Baseline 3D CNN: conv-blokker (Conv → GroupNorm → ReLU; MaxPool etter de første
# `max_pool_layers` blokkene), deretter global avg pool → FC.
# Patch-størrelse styres av train.yaml (data.patch_h / data.patch_w), ikke her.
# Med kernel [4,3,3] og én MaxPool (1,2,2) er kravet til patch ofte lavere enn med to pool.

model:
  name: "baseline_3dcnn"
  type: "3dcnn"

architecture:
  in_channels: 1
  num_classes: 2
  dropout: 0.42
  channels: [16, 32]  # to blokker
  # Én spatial/spektral MaxPool-runde totalt (etter første blokk); andre blokk uten MaxPool.
  max_pool_layers: 2
  # Conv3d (spektral D, H, W): 4×3×3 — valid conv, dimensjoner synker per lag
  kernel_size: [4, 3, 3]

# L2 (Adam weight_decay) settes i train.yaml → optimizer — ikke her.
