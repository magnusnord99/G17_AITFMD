# Enkel 3D CNN – 3 conv-blokker, global pooling.
# God baseline for sammenligning.

model:
  name: "baseline_3dcnn"
  type: "3dcnn"

architecture:
  in_channels: 1
  num_classes: 2
  dropout: 0.30
  channels: [32, 64]  # per block
  kernel_size: 3

input:
  patch_h: 64
  patch_w: 64
  spectral_bands: 16

regularization:
  weight_decay: 1.0e-4
