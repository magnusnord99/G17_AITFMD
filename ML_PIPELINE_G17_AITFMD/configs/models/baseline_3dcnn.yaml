# Baseline 3D CNN – to conv-blokker (Conv → GroupNorm → ReLU → MaxPool), global pool → FC.
# Patch-størrelse styres av train.yaml (data.patch_h / data.patch_w), ikke her.

model:
  name: "baseline_3dcnn"
  type: "3dcnn"

architecture:
  in_channels: 1
  num_classes: 2
  dropout: 0.45
  channels: [16, 32]  # to blokker
  # Conv3d (spektral D, H, W): 4×3×3 — valid conv, dimensjoner synker per lag
  kernel_size: [4, 3, 3]

regularization:
  weight_decay: 5.0e-4
