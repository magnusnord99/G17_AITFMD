# Enkel 3D CNN – 3 conv-blokker, global pooling.
# God baseline for sammenligning.

model:
  name: "baseline_3dcnn"
  type: "3dcnn"

architecture:
  in_channels: 1
  num_classes: 2
  dropout: 0.30
  channels: [16, 32]  # per block
  # Conv3d (spektral D, H, W): 4×3×3 — lokalt spektralt vindu + 3×3 romlig
  kernel_size: [4, 3, 3]

input:
  patch_h: 64
  patch_w: 64
  spectral_bands: 16

regularization:
  weight_decay: 1.0e-4
