# Lett 3D CNN – færre kanaler, raskere trening.
# For raske eksperimenter og mindre datasett.

model:
  name: "lightweight_3dcnn"
  type: "3dcnn"

architecture:
  in_channels: 1
  num_classes: 2
  dropout: 0.25
  channels: [16, 32, 64]
  kernel_size: 3

input:
  patch_h: 64
  patch_w: 64
  spectral_bands: 16

regularization:
  weight_decay: 1.0e-4
