# Dypere 3D CNN – flere lag, flere kanaler.
# For større datasett når baseline ikke er nok.

model:
  name: "deeper_3dcnn"
  type: "3dcnn"

architecture:
  in_channels: 1
  num_classes: 2
  dropout: 0.35
  channels: [32, 64, 128, 256, 256]
  kernel_size: 3

# patch_* brukes av inferens-pipeline når modell-yaml er koblet (se configs/preprocessing).
input:
  patch_h: 64
  patch_w: 64

# L2: train.yaml → optimizer.weight_decay
