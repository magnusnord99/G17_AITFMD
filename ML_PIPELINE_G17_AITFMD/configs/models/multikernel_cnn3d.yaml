# Multi-kernel 3D CNN med parallelle conv-grener (Inception-inspirert).
#
# Arkitektur:
#   Entry  : valid Conv3d(kernel=[4,3,3]) → GroupNorm → ReLU → MaxPool(1,2,2)
#   Stages : N × MultiKernelBlock3D (to parallelle grener med ulike kernels,
#            concat → GN → ReLU) + MaxPool(1,2,2) mellom stages
#   Hode   : AdaptiveAvgPool3d(1) → Dropout → Linear
#
# Parallelgrener:
#   kernel_a = [3,3,3] — kubisk 3D-kontekst (spektral + spatial)
#   kernel_b = [1,3,3] — kun romlig (H × W), spektral D ignoreres
#
# NB: channels[1:] MÅ være partall (deles likt mellom de to grenene).

model:
  name: "multikernel_cnn3d"
  type: "3dcnn"

architecture:
  in_channels: 1
  num_classes: 2
  dropout: 0.35
  # channels[0] = entry conv, channels[1:] = multi-kernel stages (partall!)
  channels: [16, 32, 64]
  # Valid conv-kernel for entry
  kernel_size: [4, 3, 3]
  # Kernel sizes for de to parallelle grenene
  kernel_a: [3, 3, 3]   # kubisk 3D
  kernel_b: [1, 3, 3]   # kun spatial (spektral-invariant)
  # Antall MaxPool(1,2,2) mellom stages (etter entry-pool)
  max_pool_layers: 1

# L2 (weight_decay) settes i train.yaml → optimizer.
