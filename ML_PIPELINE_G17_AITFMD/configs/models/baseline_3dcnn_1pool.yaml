# Baseline 3D CNN med én pooling-runde totalt.
# Identisk med baseline_3dcnn.yaml bortsett fra max_pool_layers: 1.
# Brukes for direkte sammenligning av datasett på lik arkitektur.

model:
  name: "baseline_3dcnn"
  type: "3dcnn"

architecture:
  in_channels: 1
  num_classes: 2
  dropout: 0.42
  channels: [16, 32]
  max_pool_layers: 1
  kernel_size: [4, 3, 3]

# L2 (Adam weight_decay) settes i train.yaml → optimizer — ikke her.
