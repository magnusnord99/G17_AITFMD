seed: 42

paths:
  # Input avg3 cubes (same source type as PCA pipeline)
  input_root: "/Volumes/OnG_13_2TB/hsi_avg3_float16"
  # Output wavelet-transformed cubes
  output_root: "../../data/processed_V2/wavelet16"
  # Patient-level split file (generated by make_patient_split.py)
  split_csv: "../../data/splits/patient_split.csv"
  # Manifest of wavelet outputs
  manifest_csv: "../../data/interim/wavelet_manifest.csv"

mask:
  root: "../../data/interim/masks/final_mask"
  require: true
  apply_to_cube: true

wavelet:
  # Keep aligned with PCA/AE output channels for fair comparison
  target_bands: 16
  # "approx" = original plan (approx-only + interpolation)
  # "approx_padded" = approx-only without interpolation (pad + exact coeff length)
  # "approx_detail" = 16 cA_L + 16 cD_L without interpolation (for target_bands=32)
  feature_mode: "approx_padded"
  # Common choices: db2, db4, sym4, coif1
  wavelet: "db2"
  # null => auto-select level
  # - approx: nearest target_bands
  # - approx_padded: smallest level that allows exact cA length after padding
  # - approx_detail: smallest level that allows exact half-length coeffs after padding
  level: null
  mode: "periodization"
  # Used for approx_detail padding only
  pad_mode: "edge"
  compute_dtype: "float32"
  output_dtype: "float32"

runtime:
  verbose: false
  overwrite: false
