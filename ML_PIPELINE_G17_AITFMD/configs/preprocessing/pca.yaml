seed: 42

paths:
  # Input avg3 cubes (produced by build_avg3_dataset.py)
  input_root: "/Volumes/OnG_13_2TB/hsi_avg3_float16"
  # Output root for PCA-transformed cubes
  output_root: "../../data/processed/pca32"
  # Patient-level split file (generated by make_patient_split.py)
  split_csv: "../../data/splits/patient_split.csv"
  # Where to save fitted PCA model/metadata
  model_dir: "../../data/interim/pca_models"
  model_filename: "pca_avg3_32.joblib"
  manifest_csv: "../../data/interim/pca_manifest.csv"

pca:
  n_components: 32
  svd_solver: "auto"
  # Limit train pixels used for fitting (memory control)
  max_train_pixels: 2000000
  # Load float16, cast to float32 before fit/transform
  compute_dtype: "float32"
  # Save transformed cubes as float32 by default
  output_dtype: "float32"

runtime:
  verbose: false
  overwrite: false
