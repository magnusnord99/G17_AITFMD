seed: 42

paths:
  input_dataset_root: "../../../PKG - HistologyHSI-GB"
  metadata_csv: "../../data/interim/metadata_master.csv"
  calibrated_dir: "../../data/interim/calibrated"
  masks_dir: "../../data/interim/masks"
  processed_dir: "../../data/processed"
  patches_dir: "../../data/processed/patches"
  splits_dir: "../../data/splits"

labels:
  tumor_suffix: "_T"
  non_tumor_suffix: "_NT"

calibration:
  eps: 1.0e-8
  clip_min: 0.0
  clip_max: 1.0

spectral:
  reduce_bands: true
  reduction_window: 3
  remove_edge_bands: false

tissue_mask:
  method: "mean_std_percentile"
  min_object_size: 500
  min_hole_size: 1000
  tissue_side: "dark"           
  target_tissue_ratio: null      

patching:
  # Which dataset version to patch (under paths.processed_dir)
  input_subdir: "pca32"
  output_subdir: "pca32"
  mask_subdir: "final_mask"
  splits_file: "patient_split.csv"
  patch_h: 64
  patch_w: 64
  stride_h: 32
  stride_w: 32
  min_tissue_ratio: 0.60
