# Inferanse med trent 3D CNN (baseline_3dcnn).
#
# Eksempel (fra prosjektrot):
#   python run_inference.py \
#     --input "/Volumes/DJI/G17_AITFMD /PKG - HistologyHSI-GB/P1/ROI_01_C01_T" \
#     --output-dir "outputs/inference_test" \
#     --config configs/inference/pytorch.yaml
#
# Preprocessing: configs/preprocessing/pipeline.yaml (eller overstyr paths under)

seed: 42

# GUI/klient bygger heatmap fra prediction.json (predictions + spatial).
# Sett til true kun for debugging / gammel flyt som leser heatmap.png.
write_heatmap_assets: false
write_reduced_cube: false

# Terskel for binær label (score >= threshold -> anomaly)
decision:
  anomaly_threshold: 0.5

model:
  backend: "pytorch"
  name: "baseline_3dcnn"
  checkpoint_path: "outputs/checkpoints/baseline_3dcnn_20260317_102346_best.pt"
  model_config_path: "configs/models/baseline_3dcnn.yaml"
  batch_size: 32
  # class_names: ["normal", "anomaly"]  # valgfritt; ellers fra model YAML / default

paths:
  spectral_reducer: "pca"
  ae_model: "models/ae_avg3_16.pt"
  pca_model: "models/pca_avg3_16.joblib"

preprocessing:
  pipeline_config: "configs/preprocessing/pipeline.yaml"
