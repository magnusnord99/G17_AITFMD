seed: 42

# Modell: velg fra configs/models/*.yaml
model_config: "configs/models/baseline_3dcnn.yaml"

data:
  cube_manifest_csv: "data/interim/pca_manifest.csv"
  cube_root: "data/processed/unpatched/pca16"
  mask_root: "data/interim/masks/final_mask"
  # patch_h, patch_w: overstyr model config. Uten disse brukes model input.patch_h/patch_w
  patch_h: 64
  patch_w: 64
  min_tissue_ratio: 0.0
  # patches_per_cube: antall patches per kube per epoke (1 = én tilfeldig)
  patches_per_cube: 10
  # use_all_patches: true = alle gyldige posisjoner (stride_h/stride_w)
  use_all_patches: true
  stride_h: 32
  stride_w: 32
  fold_index: 0
  batch_size: 8
  num_workers: 4

optimizer:
  name: "adam"
  lr: 1.0e-4
  weight_decay: 1.0e-4

scheduler:
  enabled: true
  name: "cosine"
  t_max_epochs: 50

loss:
  name: "cross_entropy"
  class_weighting: true

trainer:
  max_epochs: 50
  early_stopping_patience: 10
  mixed_precision: true
  save_best_only: true

paths:
  checkpoints_dir: "outputs/checkpoints"
  logs_dir: "outputs/logs"
  reports_dir: "outputs/reports"
  plots_dir: "outputs/plots"

splits:
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15

