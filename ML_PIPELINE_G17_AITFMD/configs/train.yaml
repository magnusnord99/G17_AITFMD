seed: 42

# Modell: velg fra configs/models/*.yaml
model_config: "configs/models/baseline_3dcnn.yaml"

data:
  # On-the-fly: cube manifest from build_avg_baseline_dataset.py
  cube_manifest_csv: "data/interim/avg_baseline_manifest.csv"
  # Override cube paths when manifest points to wrong location (e.g. avg16 vs unpatched/avg16)
  cube_root: "data/processed/unpatched/avg16"
  # Pre-built: patch manifest from build_patches.py (used if cube_manifest_csv missing)
  # manifest_csv: "data/processed/patches/pca32/manifest.csv"
  mask_root: "data/interim/masks/final_mask"
  patch_h: 64
  patch_w: 64
  min_tissue_ratio: 0.0
  fold_index: 0
  batch_size: 8
  num_workers: 4

optimizer:
  name: "adam"
  lr: 1.0e-4
  weight_decay: 1.0e-4

scheduler:
  enabled: true
  name: "cosine"
  t_max_epochs: 50

loss:
  name: "cross_entropy"
  class_weighting: true

trainer:
  max_epochs: 50
  early_stopping_patience: 10
  mixed_precision: true
  save_best_only: true

paths:
  checkpoints_dir: "outputs/checkpoints"
  logs_dir: "outputs/logs"
  reports_dir: "outputs/reports"

splits:
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15

